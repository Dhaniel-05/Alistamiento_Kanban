name: Deploy to VPS

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  DEPLOY_PATH: /opt/alistamiento

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: |
            Alistamiento_Backend/package-lock.json
            Alistamiento_Frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: Alistamiento_Backend
        run: npm ci

      - name: Run backend tests
        working-directory: Alistamiento_Backend
        run: npm test

      - name: Install frontend dependencies
        working-directory: Alistamiento_Frontend
        run: npm ci

      - name: Lint frontend
        working-directory: Alistamiento_Frontend
        run: npm run lint

      - name: Build frontend
        working-directory: Alistamiento_Frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.2
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DB_PASSWORD,JWT_SECRET,CORS_ORIGIN,VITE_API_URL
          script_stop: true
          script: |
            set -euo pipefail

            cd "${{ env.DEPLOY_PATH }}"

            git fetch origin main
            git reset --hard origin/main

            umask 077
            printf '%s\n' \
              "MYSQL_ROOT_PASSWORD=${DB_PASSWORD}" \
              "MYSQL_DATABASE=alistamiento_db" \
              "MYSQL_USER=alistamiento_user" \
              "MYSQL_PASSWORD=${DB_PASSWORD}" \
              "BACKEND_PORT=3000" \
              "JWT_SECRET=${JWT_SECRET}" \
              "CORS_ORIGIN=${CORS_ORIGIN}" \
              "VITE_API_URL=${VITE_API_URL}" \
              "HTTP_PORT=80" \
              "HTTPS_PORT=443" \
              "NGINX_CONFIG=./Alistamiento_Frontend/nginx.conf" \
              "SSL_CERT_DIR=./certs" \
              > .env

            docker compose build --no-cache
            docker compose up -d
            docker image prune -f
